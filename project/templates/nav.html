{% load static %}
<div class="header-2 sticky top-0 z-50 backdrop-blur-md bg-white/80 shadow-sm">

  <nav class="py-3">
    <div class="container px-6 mx-auto flex items-center justify-between">

      <!-- Logo -->
      <a href="#" class="text-2xl font-extrabold text-indigo-600 tracking-tight hover:scale-105 transition">
        TheDailyDraft
      </a>

      <!-- Mobile Toggle -->
      <button id="navbar-toggle"
        class="md:hidden p-2 rounded-lg border hover:bg-gray-100 transition">
        <img src="{% static 'images/menu.png' %}" class="w-5" alt="">
      </button>

      <!-- Search Bar -->
      <div class="hidden md:flex flex-1 justify-center px-6">
        <div class="relative w-full max-w-lg">
          <input
            type="text"
            placeholder="Search articles..."
            class="w-full px-5 py-2 pl-11 rounded-full border border-gray-200 shadow-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none transition"
          >

          <!-- Icon -->
          <svg class="absolute left-4 top-2.5 w-5 h-5 text-gray-400"
            fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
      </div>

      <!-- Nav Links -->
      <div id="navbar-collapse"
        class="hidden md:flex items-center gap-3">

        <a href="{% url 'home' %}"
          class="px-4 py-2 rounded-lg bg-indigo-600 text-white shadow hover:bg-indigo-700 transition">
          Home
        </a>

        <a href="{% url 'pricing' %}"
          class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-indigo-600 transition">
          Pricing
        </a>

        <a href="{% url 'blogs' %}"
          class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-indigo-600 transition">
          Posts
        </a>

        <a href="{% url 'about' %}"
          class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-indigo-600 transition">
          About
        </a>

        {% if user.is_authenticated %}

        <a href="{% url 'create' %}"
          class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-indigo-600 transition">
          New Post
        </a>

        {% if user.is_superuser %}

        <a href="/admin/"  class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-indigo-600 transition">

          Dashboard
        </a>

        {% endif %}

        <!-- Profile -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-100 hover:bg-gray-200 transition cursor-pointer">
          <div class="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-500 text-white font-bold">
            {{ user.username|first|upper }}
          </div>
          <span class="text-sm font-medium text-gray-800">
            {{ user.username }}
          </span>
        </div>

        <a href="{% url 'logout' %}"
          class="px-4 py-2 rounded-lg text-white bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-600 hover:to-pink-600 shadow-md transition">
          Logout
        </a>

        {% else %}

        <a href="{% url 'login' %}"
          class="px-4 py-2 text-indigo-600 rounded-lg hover:bg-indigo-100 transition">
          Login
        </a>

        <a href="{% url 'register' %}"
          class="px-4 py-2 rounded-lg border border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white transition">
          Register
        </a>

        {% endif %}
      </div>
    </div>
  </nav>
</div>

<!-- JS for mobile toggle -->
<script>
  const toggle = document.getElementById("navbar-toggle");
  const menu = document.getElementById("navbar-collapse");

  toggle.addEventListener("click", () => {
    menu.classList.toggle("hidden");
    menu.classList.toggle("flex");
    menu.classList.toggle("flex-col");
    menu.classList.toggle("absolute");
    menu.classList.toggle("top-16");
    menu.classList.toggle("left-0");
    menu.classList.toggle("w-full");
    menu.classList.toggle("bg-white");
    menu.classList.toggle("p-4");
    menu.classList.toggle("shadow-md");
  });
</script>
